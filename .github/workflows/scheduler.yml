name: Scheduler Job

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      app-name:
        type: string
        description: application name
        required: true
      version:
        type: choice
        options:
          - v1
          - v2
          - v3
        description: application version
        required: true

jobs:
  my-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print time
        run: echo "The server time is $(date)"
